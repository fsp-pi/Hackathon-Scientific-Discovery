services:
  postgres:
    image: postgres:16-alpine
    container_name: hackathon-local-pg
    environment:
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon
      POSTGRES_DB: hackathon
    ports:
      - "5433:5432"
    volumes:
      - hackathon-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackathon -d hackathon"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  hackathon-pgdata:
